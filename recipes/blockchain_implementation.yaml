  - id: phase4_testing_production
    type: ai
    condition: "{{implementation_phase}} == 'testing' || {{implementation_phase}} == 'all'"
    instructions: |
      🧪 **PHASE 4: Testing, Security & Production Readiness**
      
      You are implementing comprehensive testing and production hardening for the blockchain receipt system.
      Ensure security, reliability, and production readiness.
      
      **CONTEXT:**
      - All previous phases (backend, blockchain, frontend) are complete
      - Need comprehensive testing coverage
      - Security hardening and production deployment
      - Performance optimization and monitoring
      
      **IMPLEMENTATION TASKS:**
      
      1. **Comprehensive Test Suite:**
         
         **Backend API Tests (tests/api/):**
         ```typescript
         // tests/api/receipts.test.ts
         describe('Receipt API', () => {
           describe('POST /api/receipts', () => {
             test('creates receipt with valid data');
             test('validates API key authentication');
             test('generates deterministic hashes');
             test('handles Supabase errors gracefully');
             test('queues anchoring when requested');
           });
           
           describe('GET /api/receipts/[id]', () => {
             test('returns receipt for valid ID');
             test('enforces organization access control');
             test('returns 404 for non-existent receipts');
           });
           
           describe('POST /api/receipts/verify', () => {
             test('verifies valid receipts');
             test('detects tampered receipts');
             test('verifies blockchain anchors');
           });
         });
         ```
         
         **Blockchain Tests (tests/blockchain/):**
         ```typescript
         describe('Blockchain Service', () => {
           test('anchors hashes to Polygon Amoy');
           test('handles insufficient gas errors');
           test('retries failed transactions');
           test('verifies transaction confirmations');
           test('detects network connection issues');
         });
         ```
         
         **Hash Generation Tests (tests/crypto/):**
         ```typescript
         describe('Receipt Hashing', () => {
           test('generates deterministic hashes');
           test('detects data tampering');
           test('handles edge cases (empty fields, special chars)');
           test('maintains hash consistency across versions');
         });
         ```
      
      2. **Security Hardening:**
         
         **Input Validation & Sanitization:**
         - Comprehensive Joi schemas for all inputs
         - SQL injection prevention
         - XSS protection in receipt data
         - File path traversal protection
         
         **API Security:**
         ```typescript
         // Enhanced security middleware
         app.use(helmet({
           contentSecurityPolicy: {
             directives: {
               defaultSrc: ["'self'"],
               scriptSrc: ["'self'", "'unsafe-inline'"],
             },
           },
           hsts: {
             maxAge: 31536000,
             includeSubDomains: true,
             preload: true
           }
         }));
         
         // Rate limiting
         app.use('/api', rateLimit({
           windowMs: 15 * 60 * 1000, // 15 minutes
           max: 100, // limit each IP to 100 requests per windowMs
           message: 'Too many requests from this IP'
         }));
         ```
         
         **Environment Security:**
         - Validate all environment variables on startup
         - Secure private key storage and access
         - Environment-specific configurations
         - Secrets rotation planning
      
      3. **Performance Optimization:**
         
         **Database Performance:**
         - Add database indexes for common queries
         - Implement connection pooling
         - Query optimization and monitoring
         - Add database health checks
         
         **API Performance:**
         ```typescript
         // Response caching for verification
         app.use('/api/receipts/verify', cache('5 minutes'));
         
         // Compression
         app.use(compression());
         
         // Request timeout handling
         app.use(timeout('30s'));
         ```
         
         **Blockchain Performance:**
         - Batch transaction processing
         - Gas price optimization
         - Connection pooling for RPC calls
         - Retry strategies with exponential backoff
      
      4. **Error Monitoring & Logging:**
         
         **Structured Logging:**
         ```typescript
         import winston from 'winston';
         
         const logger = winston.createLogger({
           level: 'info',
           format: winston.format.combine(
             winston.format.timestamp(),
             winston.format.json()
           ),
           transports: [
             new winston.transports.Console(),
