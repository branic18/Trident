version: 1
name: trident_blockchain_receipts
description: >
  Comprehensive modular implementation of blockchain receipt system for Trident vulnerability scanner.
  Creates secure, verifiable scan receipts with optional blockchain anchoring using Polygon Amoy testnet.

parameters:
  - name: implementation_phase
    description: "Which phase to implement: foundation|blockchain|frontend|testing|all"
    required: true
  - name: blockchain_network
    description: "Target blockchain network for anchoring"
    default: "polygon-amoy"
  - name: project_root
    description: "Root directory of the project"
    default: "/Users/digitalflower/Desktop/Hackathon"

tasks:
  - id: phase1_foundation_backend
    type: ai
    condition: "{{implementation_phase}} == 'foundation' || {{implementation_phase}} == 'all'"
    instructions: |
      🏗️ **PHASE 1: Foundation Backend Setup**
      
      You are implementing the backend infrastructure for Trident's blockchain receipt system.
      Create a complete Express.js API server that handles scan receipts.
      
      **CONTEXT:**
      - Project: VS Code vulnerability scanner extension (Trident)
      - Goal: Generate cryptographic receipts for security scans 
      - Stack: Node.js/Express + TypeScript + Supabase + Vercel
      - Auth: MVP API key system (sk_org_[id]_[hash])
      
      **IMPLEMENTATION TASKS:**
      
      1. **Project Structure Setup:**
         ```
         /api/
           /receipts/
             index.ts          # POST /api/receipts - create receipt
             [id].ts          # GET /api/receipts/[id] - get receipt
             verify.ts        # POST /api/receipts/verify - verify receipt
           /health/
             index.ts         # GET /api/health - health check
         /lib/
           supabase.ts        # Supabase client setup
           auth.ts           # API key validation
           receipt.ts        # Receipt generation & hashing
           types.ts          # TypeScript interfaces
           validation.ts     # Input validation with Joi
         /utils/
           crypto.ts         # Hashing utilities
           errors.ts         # Error handling
         vercel.json          # Vercel deployment config
         package.json         # Dependencies
         tsconfig.json        # TypeScript config
         .env.example         # Environment template
         ```
      
      2. **Core Type Definitions (lib/types.ts):**
         ```typescript
         export interface ScanReceipt {
           id: string;              // UUID
           orgId: string;
           projectId: string;
           repo: string;
           commit: string;
           environment: 'production' | 'staging' | 'development';
           timestamp: string;       // ISO 8601
           tool: string;           // 'securemap-npm-audit'
           totalDependencies: number;
           vulnerableDependencies: number;
           totalVulnerabilities: number;
           critical: number;
           high: number;
           medium: number;
           low: number;
           status: 'pass' | 'fail';
           receiptHash: string;    // SHA-256 hex
           scanHash?: string;      // Optional full scan hash
           scanLocation?: string;  // Optional SBOM location
           anchoringRequested: boolean;
           anchored: boolean;
           chainTxId: string | null;
           chainNetwork: string | null;
           createdAt: string;
           createdByUserId: string;
         }
         
         export interface CreateReceiptRequest {
           repo: string;
           commit: string;
           environment: 'production' | 'staging' | 'development';
           scanSummary: {
             totalDependencies: number;
             vulnerableDependencies: number;
             totalVulnerabilities: number;
             critical: number;
             high: number;
             medium: number;
             low: number;
             status: 'pass' | 'fail';
           };
           anchoringRequested?: boolean;
           gooseSummary?: string;
         }
         ```
      
      3. **Supabase Integration (lib/supabase.ts):**
         - Initialize Supabase client with service role key
         - Create helper functions for CRUD operations
         - Handle connection errors gracefully
         - Implement retry logic for database operations
      
      4. **Receipt Generation & Hashing (lib/receipt.ts):**
         ```typescript
         // Canonical receipt hashing - order matters!
         function generateReceiptHash(data: {
           repo: string;
           commit: string;
           environment: string;
           timestamp: string;
           summary: ScanSummary;
           gooseSummary?: string;
         }): string {
           // Create deterministic JSON (sorted keys)
           // Compute SHA-256 hash
           // Return hex string
         }
         ```
      
      5. **API Key Authentication (lib/auth.ts):**
         - Validate API key format: sk_org_[id]_[hash]
         - Map API key to orgId/projectId for MVP
         - Implement middleware for request authentication
         - Add rate limiting protection
      
      6. **API Endpoints:**
         
         **POST /api/receipts** - Create Receipt:
         - Validate API key and extract orgId
         - Validate input data with Joi schema
         - Generate UUID and timestamp
         - Compute receipt hash
         - Store in Supabase scan_receipts table
         - Return receipt data with generated fields
         
         **GET /api/receipts/[id]** - Get Receipt:
         - Validate API key and orgId access
         - Fetch receipt from database
         - Return receipt data or 404
         
         **POST /api/receipts/verify** - Verify Receipt:
         - Accept receipt data for verification
         - Recompute hash and compare
         - Check blockchain if anchored
         - Return verification status
      
      7. **Environment Configuration:**
         - Set up .env.example with all required variables
         - Configure Vercel deployment settings
         - Add proper CORS for VS Code extension
         - Set up error logging and monitoring
      
      8. **Error Handling & Validation:**
         - Comprehensive input validation
         - Proper HTTP status codes
         - Structured error responses
         - Request logging for debugging
      
      9. **Testing Setup:**
         - Unit tests for receipt generation
         - Integration tests for API endpoints
         - Mock Supabase for testing
         - Test API key validation
      
      **DELIVERABLES:**
      - Complete backend API server ready for Vercel deployment
      - All environment variables configured
      - Comprehensive error handling
      - Input validation and security measures
      - Ready for Phase 2 blockchain integration
      
      **SUCCESS CRITERIA:**
      - POST /api/receipts creates valid receipts
      - Receipt hashing is deterministic and secure
      - API key authentication works correctly
      - All endpoints return proper HTTP responses
      - Ready to deploy to Vercel

